server {
    listen 80;
    # Listen for both the domain and the direct IP
    server_name django16417.duckdns.org 20.219.27.149;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        # This path must match the static_volume path in docker-compose
        alias /home/myuser/web/staticfiles/;
    }
}