# Block 1: Redirect HTTP to HTTPS
server {
    listen 80;
    server_name django16417.duckdns.org 20.219.27.149;
    
    return 301 https://django16417.duckdns.org$request_uri;
}

# Block 2: The Secure HTTPS Server
server {
    listen 443 ssl;
    server_name django16417.duckdns.org;

    # Point to the Let's Encrypt certificates we just generated
    ssl_certificate /etc/letsencrypt/live/django16417.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/django16417.duckdns.org/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Force HTTPS upstream
        proxy_redirect off;
    }

    location /static/ {
        alias /home/myuser/web/staticfiles/;
    }
}