{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-success">Create an Account</h2>
                    <p class="text-muted">Join us to start organizing your workflow</p>
                </div>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <div class="d-grid gap-2 mt-5">
                        <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm">Create Account</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold text-success">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
