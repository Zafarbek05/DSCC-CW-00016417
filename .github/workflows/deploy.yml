name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip uninstall -y decouple
        pip install python-decouple flake8 pytest pytest-django
        pip install -r requirements.txt
        
    - name: Run Code Quality Checks (flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Tests
      env:
        SECRET_KEY: 'dummy-key-for-tests'
        DEBUG: 'True'
      run: |
        pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/dscc-project:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/dscc-project:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Azure Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Pull and Start services
          sudo docker compose pull
          sudo docker compose up -d
          
          # 2. If Nginx is failing because of missing certs, run certbot first
          sudo docker compose run --rm --entrypoint "/bin/sh -c 'apk add --no-cache certbot certbot-nginx && certbot certonly --standalone -d django16417.duckdns.org --non-interactive --agree-tos -m zafarbek@example.com'" nginx
          
          # 3. Now start everything properly
          sudo docker compose up -d
          
          # 4. Run migrations and static (This will now work once decouple is fixed)
          sudo docker compose exec -T web python manage.py migrate
          sudo docker compose exec -T -u root web chown -R myuser:myuser /app/staticfiles
          sudo docker compose exec -T web python manage.py collectstatic --noinput