name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip uninstall -y decouple
        pip install python-decouple flake8 pytest pytest-django
        pip install -r requirements.txt
        
    - name: Run Code Quality Checks (flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Tests
      env:
        SECRET_KEY: 'dummy-key-for-tests'
        DEBUG: 'True'
      run: |
        pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/dscc-project:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/dscc-project:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Navigate to the project folder (Update 'dscc_project' if your folder name is different)
          cd ~/DSCC-CW-00016417 || cd ~/dscc_project || cd ~/
          
          # 2. Force pull the latest code
          git fetch --all
          git reset --hard origin/main
          
          # 3. Pull newest images
          sudo docker compose pull
          
          # 4. Start services (Allowing it to fail if SSL certs are missing initially)
          sudo docker compose up -d || true
          
          # 5. If Nginx is failing because of missing certs, run certbot first
          sudo docker compose run --rm --entrypoint "/bin/sh -c 'apk add --no-cache certbot certbot-nginx && certbot certonly --standalone -d django16417.duckdns.org --non-interactive --agree-tos -m zafarbek@example.com'" nginx || true
          
          # 6. Fix permissions for static files (Critical for Django)
          sudo docker compose exec -T -u root web chown -R myuser:myuser /app/staticfiles || true
          
          # 7. Run Migrations and Collectstatic
          sudo docker compose exec -T web python manage.py migrate --noinput
          sudo docker compose exec -T web python manage.py collectstatic --noinput
          
          # 8. Restart Web service to apply changes
          sudo docker compose restart web
          
          # 9. Reload Nginx to apply any config changes
          sudo docker compose exec -T nginx nginx -s reload || true