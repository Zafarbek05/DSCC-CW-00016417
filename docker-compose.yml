services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 config.wsgi:application
    volumes:
      - .:/home/myuser/web
      - static_volume:/home/myuser/web/staticfiles
    expose:
      - "8000"
    ports:
      - "8000:8000"  # <--- ADD THIS LINE to open the door
    env_file:
      - .env
    depends_on:
      - db

  nginx:
    image: nginx:1.29.5-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/home/myuser/web/staticfiles
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  cert_volume:
  